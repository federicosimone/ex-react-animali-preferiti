<!-- index.html -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I miei animali Preferiti</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel">

        function Modal({
            title,
            content,
            show = false,
            onClose = () => { },
            onConfirm = () => { }
        }) {
            return show && ReactDOM.createPortal(
                <div className="modal-container">
                    <div className="modal">
                        <h2>{title}</h2>
                        <p>{content}</p>
                        <div>
                            <button onClick={onClose}>Annulla</button>
                            <button onClick={onConfirm}>Conferma</button>
                        </div>

                    </div>
                </div>,
                document.body
            )
        }




        const AnimalList = () => {

            const { useState } = React;
            const { useEffect } = React;

            const animalsChoices = ["Cane", "Gatto", "Pappagallo", "Cavallo", "Panda"];


            const [animals, setAnimals] = useState([]);  //parto con un array vuoto, da riempire ad ogni click con onClick 

            const [show, setShow] = useState(false);

            const [animalName, setAnimalName] = useState("");

            const addAnimal = () => {
                if (!animalName) return;
                setAnimals(curr => [...curr, animalName])
                setAnimalName("")
                setShow(false)
            }



            return (
                <div>
                    <button onClick={() => setShow(true)}>Aggiungi Animale</button>
                    <details>
                        <summary><strong>Animali</strong></summary>
                        <ul>
                            {animals.map(animale => {
                                return <li>{animale}</li>
                            })}
                        </ul>
                    </details>
                    <Modal
                        show={show}
                        onClose={() => setShow(false)}
                        onConfirm={addAnimal}
                        title="Aggiungi animale"
                        content={
                            <input
                                type="text"
                                value={animalName}
                                onChange={e => setAnimalName(e.target.value)}
                            />

                        }
                    />
                </div>

            )
        }

        const { createRoot } = ReactDOM;
        const lista = document.querySelector('.lista-animali');
        const root = createRoot(lista);
        root.render(<AnimalList />);



    </script>
</head>

<body>
    <header>
        <h1>I miei animali Preferiti</h1>
    </header>
    <main>
        <figure>
            <img src="https://picsum.photos/400/300" alt="Immagine Casuale">
        </figure>
        <div class="lista-animali"></div>
    </main>
    <footer>
        <p>Creato con amore da... un collega sbadato! 🐾</p>
    </footer>
</body>

</html>

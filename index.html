<!-- index.html -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I miei animali Preferiti</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel">




        const AnimalList = () => {

            const { useState } = React;
            const { useEffect } = React;


            const [animals, setAnimals] = useState([]);  //parto con un array vuoto, da riempire ad ogni click con onClick 

            const animalsChoices = ["Cane", "Gatto", "Pappagallo", "Cavallo", "Panda"];

            function addAnimal() {
                const indiceCasuale = Math.floor(Math.random() * animalsChoices.length);  //setAnimals accetta un solo argomento quindi inserisco tutto dentro le quadre
                //per aggiungere un elemento senza il push, uso lo spread operator dell'array animals e gli aggiungo un elemento dell'array animalChoices all'indice creato casualmente.
                setAnimals([...animals, animalsChoices[indiceCasuale]])
                return
            }



            return (
                <div>
                    <button onClick={addAnimal}
                    >Aggiungi Animale</button>
                    <details>
                        <summary><strong>Animali</strong></summary>
                        <ul>
                            {animals.map(animale => {
                                return <li>{animale}</li>
                            })}
                        </ul>
                    </details>
                </div>

            )
        }

        const { createRoot } = ReactDOM;
        const lista = document.querySelector('.lista-animali');
        const root = createRoot(lista);
        root.render(<AnimalList />);

        function Modal({
            title,
            content,
            show = false,
            onClose = () => { }
        }) {
            return show && ReactDOM.createPortal(
                <div className="modal-container">
                    <div className="modal">
                        <h2>{title}</h2>
                        <p>{content}</p>
                        <button onClick={onClose}>Annulla</button>
                    </div>
                </div>,
                document.body
            )
        }

    </script>
</head>

<body>
    <header>
        <h1>I miei animali Preferiti</h1>
    </header>
    <main>
        <figure>
            <img src="https://picsum.photos/400/300" alt="Immagine Casuale">
        </figure>
        <div class="lista-animali"></div>
    </main>
    <footer>
        <p>Creato con amore da... un collega sbadato! 🐾</p>
    </footer>
</body>

</html>
